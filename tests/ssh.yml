name: SSH testsuite
testcases:
- name: ssh foo status
  steps:
  - type: ssh
    user: venom
    host: localhost:2222
    insecure_ignore_host_key: true
    command: echo foo
    assertions:
    - result.code ShouldEqual 0
    - result.timeseconds ShouldBeLessThan 10

- name: ssh sudo as root
  steps:
  - type: ssh
    user: venom
    host: localhost:2222
    insecure_ignore_host_key: true
    command: whoami
    sudo: root
    sudopassword: testvenom
    assertions:
    - result.code ShouldEqual 0
    - result.systemout ShouldEqual root
    - result.timeseconds ShouldBeLessThan 10

- name: ssh sudo as self
  steps:
  - type: ssh
    user: venom
    host: localhost:2222
    insecure_ignore_host_key: true
    command: whoami
    sudo: venom
    sudopassword: testvenom
    assertions:
    - result.code ShouldEqual 0
    - result.systemout ShouldEqual venom
    - result.timeseconds ShouldBeLessThan 10
